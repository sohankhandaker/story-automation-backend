services:
  - type: web
    name: story-automation-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: story-automation-db
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_PROJECT_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: POLL_INTERVAL_SECONDS
        value: "60"
      - key: MAX_REVIEW_CYCLES
        value: "5"

databases:
  - name: story-automation-db
    databaseName: story_automation
    plan: free
